server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Inoltra le chiamate OCR al backend FastAPI (servizio "backend" in docker-compose)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Le Web App di Telegram richiedono di essere caricate in iframe:
    # niente header che blocchino il framing.
    add_header X-Frame-Options "";
    add_header Content-Security-Policy "";
}
