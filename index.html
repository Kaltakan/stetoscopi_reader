<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scansione codici</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    font-family: -apple-system, Roboto, sans-serif;
    background: #0f0f10;
    color: #f2f2f2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
  }
  h2 { margin: 8px 0; font-size: 18px; }
  #reader { width: 100%; max-width: 420px; border-radius: 12px; overflow: hidden; }
  .status {
    width: 100%; max-width: 420px;
    margin-top: 12px;
    background: #1c1c1e;
    border-radius: 12px;
    padding: 12px 16px;
  }
  .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 15px; }
  .row span:first-child { color: #9a9a9a; }
  .ok { color: #4cd964; }
  .pending { color: #ff9f0a; }
  progress { width: 100%; max-width: 420px; margin-top: 10px; height: 10px; }
  #log {
    width: 100%; max-width: 420px;
    margin-top: 10px;
    max-height: 160px;
    overflow-y: auto;
    font-size: 12px;
    color: #8e8e93;
  }
  #log div { padding: 2px 0; border-bottom: 1px solid #2c2c2e; }
</style>
</head>
<body>
  <h2>Scansione in tempo reale (0/55)</h2>
  <div id="reader"></div>

  <div class="status">
    <div class="row"><span>Codice D:</span><span id="valD" class="pending">in attesa…</span></div>
    <div class="row"><span>Codice V:</span><span id="valV" class="pending">in attesa…</span></div>
    <div class="row"><span>Righe completate:</span><span id="conteggio">0 / 55</span></div>
  </div>

  <progress id="barra" max="55" value="0"></progress>
  <div id="log"></div>

<script>
const TOTALE_RIGHE = 55;
const PREFISSO_D = "d";
const PREFISSO_V = "V";

const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let righe = [];          // array di {d, v, concat}
let codiceD = null;
let codiceV = null;
let ultimoTesto = "";
let ultimoTempo = 0;

const elD = document.getElementById("valD");
const elV = document.getElementById("valV");
const elConteggio = document.getElementById("conteggio");
const elBarra = document.getElementById("barra");
const elTitolo = document.querySelector("h2");
const elLog = document.getElementById("log");

function log(msg) {
  const d = document.createElement("div");
  d.textContent = msg;
  elLog.prepend(d);
}

function aggiornaUI() {
  elD.textContent = codiceD || "in attesa…";
  elD.className = codiceD ? "ok" : "pending";
  elV.textContent = codiceV || "in attesa…";
  elV.className = codiceV ? "ok" : "pending";
  elConteggio.textContent = `${righe.length} / ${TOTALE_RIGHE}`;
  elBarra.value = righe.length;
  elTitolo.textContent = `Scansione in tempo reale (${righe.length}/${TOTALE_RIGHE})`;
}

function provaChiudiRiga() {
  if (codiceD && codiceV) {
    const concat = `${codiceD}/${codiceV}`;
    righe.push({ d: codiceD, v: codiceV, concat });
    log(`Riga ${righe.length}: ${codiceD} | ${codiceV} | ${concat}`);
    codiceD = null;
    codiceV = null;
    aggiornaUI();

    if (righe.length >= TOTALE_RIGHE) {
      concludi();
    } else {
      tg.HapticFeedback.notificationOccurred("success");
    }
  }
}

function concludi() {
  html5QrCode.stop().catch(() => {});
  elTitolo.textContent = "Completato! Invio dati al bot…";
  tg.sendData(JSON.stringify({ righe }));
  // sendData chiude automaticamente la Web App dopo l'invio
}

function onScanSuccess(decodedText) {
  // Evita di processare lo stesso identico testo più volte di seguito
  const ora = Date.now();
  if (decodedText === ultimoTesto && ora - ultimoTempo < 1500) return;
  ultimoTesto = decodedText;
  ultimoTempo = ora;

  if (decodedText.toLowerCase().startsWith(PREFISSO_D.toLowerCase())) {
    if (codiceD !== decodedText) {
      codiceD = decodedText;
      tg.HapticFeedback.impactOccurred("light");
      aggiornaUI();
      provaChiudiRiga();
    }
  } else if (decodedText.toLowerCase().startsWith(PREFISSO_V.toLowerCase())) {
    if (codiceV !== decodedText) {
      codiceV = decodedText;
      tg.HapticFeedback.impactOccurred("light");
      aggiornaUI();
      provaChiudiRiga();
    }
  }
  // Se il codice non ha nessuno dei due prefissi, viene ignorato silenziosamente
}

const html5QrCode = new Html5Qrcode("reader");
const config = {
  fps: 10,
  qrbox: { width: 260, height: 180 },
  aspectRatio: 1.4,
};

html5QrCode
  .start({ facingMode: "environment" }, config, onScanSuccess)
  .catch((err) => {
    log("Errore avvio fotocamera: " + err);
    tg.showAlert("Impossibile avviare la fotocamera: " + err);
  });

aggiornaUI();
</script>
</body>
</html>
